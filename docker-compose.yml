version: '3.9'

services:
  blossom-api:
    build:
      context: .
      target: production
    container_name: blossom-api
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - DB_PATH=/app/data/blossom.db
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX_REQUESTS=100
      - CACHE_TTL_SECONDS=300
      - CACHE_ENABLED=true
    volumes:
      - blossom_data:/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # Dev profile: hot-reload with ts-node
  blossom-api-dev:
    build:
      context: .
      target: builder
    container_name: blossom-api-dev
    profiles: ["dev"]
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
      - PORT=3000
      - DB_PATH=/app/data/blossom.db
    volumes:
      - .:/app
      - /app/node_modules
      - blossom_data:/app/data
    command: npm run dev
    restart: unless-stopped

volumes:
  blossom_data:
    driver: local
